name: Run Tests
on:
  pull_request:
    branches:
      - main
jobs:
  yolo-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r services/yolo/torch-requirements.txt
          pip install -r services/yolo/requirements.txt
      - name: Run tests with coverage
        run: pytest tests/
        working-directory: services/yolo
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: services/yolo/coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  agent-test:
    runs-on: ubuntu-latest
    env:
      # Dummy values so `import app` never reaches a real provider.
      MODEL: openai:gpt-5.4-mini
      OPENAI_API_KEY: test-key
      YOLO_SERVICE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r services/agent/requirements.txt
      - name: Run agent tests
        run: pytest tests/ -v
        working-directory: services/agent
